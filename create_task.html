<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Task - School Task Assignment</title>
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/footer.css">
  <link rel="stylesheet" href="styles/create_task.css">
  <script src="scripts/navbar.js" defer></script>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar" id="navbar">
    <div class="nav sizer">
      <div class="logo" id="logo">
        <H1>Classroom of FCAI</H1>
      </div>
      <button class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="rightSec" id="rightSec">
        <a class="links" href="index.html">Home</a>
        <a class="links" href="about.html">About</a>
        <a class="links" href="login.html">Login</a>
      </div>
    </div>
  </div>

  <div class="page">
    <div class="container">
      <div class="task-form">
        <h1>Create New Task</h1>
        <form action="task_list.html" method="post">
          <div class="form-group">
            <label for="title">Task Title:</label>
            <input type="text" id="title" name="title" required>
          </div>
          <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" required></textarea>
          </div>
          <div class="form-group">
            <label for="assigned-date">Assigned Date:</label>
            <input type="date" id="assigned-date" name="assigned-date" required>
          </div>
          <div class="form-group">
            <label for="due-date">Due Date:</label>
            <input type="date" id="due-date" name="due-date" required>
          </div>
          <div class="form-group">
            <label for="attachments">Attachments:</label>
            <input type="file" id="attachments" name="attachments" multiple>
          </div>
          <div class="actions">
            <a href="task_list.html" class="btn">Cancel</a>
            <button type="submit" class="btn">Create Task</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Footer Section -->
    <footer class="footer">
      <div class="footer-content">
        <p>&copy; 2025 School Task Assignment. All Rights Reserved.</p>
      </div>
    </footer>
  </div>

</body>
</html>
